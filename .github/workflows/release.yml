name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    # TODO: Update to macos-15 or later when Xcode 26 is available on GitHub runners
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # TODO: Update to Xcode 26 when available
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Create app bundle
        run: make bundle

      - name: Package
        run: zip -r StatusBar.zip StatusBar.app

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: StatusBar.zip
          generate_release_notes: true
