name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode-beta.app

      - name: Generate plugin loader
        run: make generate

      - name: Build release
        run: swift build -c release

      - name: Create app bundle
        run: make bundle

      - name: Ad-hoc code sign
        run: codesign --force --deep --entitlements StatusBar.entitlements -s - StatusBar.app

      - name: Package
        run: zip -r StatusBar.zip StatusBar.app

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: StatusBar.zip
          generate_release_notes: true
