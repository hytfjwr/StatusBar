name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  release:
    needs: test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "previous_tag=${LATEST}" >> "$GITHUB_OUTPUT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${VERSION} (previous: ${LATEST})"

      - name: Create release branch
        run: git checkout -b release/${{ steps.version.outputs.tag }}

      - name: Update Info.plist version
        run: make set-version VERSION=${{ steps.version.outputs.version }}

      - name: Update CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)

          # Collect commits since last tag into a temp file
          LATEST_TAG="${{ steps.version.outputs.previous_tag }}"
          if [ "$LATEST_TAG" != "v0.0.0" ]; then
            git log "${LATEST_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "^- chore: release " > /tmp/commits.txt || true
          else
            git log --pretty=format:"- %s" --no-merges | grep -v "^- chore: release " > /tmp/commits.txt || true
          fi

          # Insert version header and commits via awk (reads commits from file to avoid newline issues)
          awk -v ver="$VERSION" -v date="$DATE" '
            /^## \[Unreleased\]/ {
              print "## [Unreleased]"
              print ""
              print "## [" ver "] - " date
              if ((getline first < "/tmp/commits.txt") > 0) {
                print ""
                print first
                while ((getline line < "/tmp/commits.txt") > 0) print line
              }
              close("/tmp/commits.txt")
              next
            }
            { print }
          ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
          rm -f /tmp/commits.txt

      - name: Commit version bump
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Resources/Info.plist CHANGELOG.md
          git commit -m "chore: release ${TAG}"

      - name: Push branch
        run: git push origin release/${{ steps.version.outputs.tag }}

      - name: Create version bump PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh pr create \
            --title "chore: release ${TAG}" \
            --body "Update Info.plist and CHANGELOG for ${TAG}." \
            --head "release/${TAG}" \
            --base main \
            --reviewer hytfjwr
