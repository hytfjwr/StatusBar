name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # TODO: Update to macos-16 or later when Xcode 26 is available on GitHub runners
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # TODO: Update to Xcode 26 when available
        run: |
          if [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          else
            sudo xcode-select -s /Applications/Xcode_16.3.app
          fi

      - name: Check Swift version compatibility
        id: swift-check
        run: |
          SWIFT_VERSION=$(swift -version 2>&1 | head -1)
          echo "Swift version: $SWIFT_VERSION"
          REQUIRED="6.2"
          CURRENT=$(swift -version 2>&1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
          if [ "$(printf '%s\n' "$REQUIRED" "$CURRENT" | sort -V | head -1)" = "$REQUIRED" ]; then
            echo "compatible=true" >> "$GITHUB_OUTPUT"
          else
            echo "compatible=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Swift $CURRENT is installed but $REQUIRED+ is required. Skipping build and test until Xcode 26 is available on GitHub runners."
          fi

      - name: Resolve dependencies
        if: steps.swift-check.outputs.compatible == 'true'
        run: swift package resolve

      - name: Build
        if: steps.swift-check.outputs.compatible == 'true'
        run: swift build

      - name: Test
        if: steps.swift-check.outputs.compatible == 'true'
        run: swift test
