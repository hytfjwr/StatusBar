name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # TODO: Update to macos-16 or later when Xcode 26 is available on GitHub runners
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # TODO: Update to Xcode 26 when available
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  swiftlint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Lint (via SPM build tool plugin)
        run: swift build 2>&1 | grep -i "swiftlint\|warning\|error" || true
