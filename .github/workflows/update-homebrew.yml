name: Update Homebrew

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  update-homebrew:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Extract version tag
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          TAG="${BRANCH#release/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create Homebrew formula PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set, skipping Homebrew tap update"
            exit 0
          fi

          TARBALL_URL="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -fsSL --retry 3 --retry-delay 2 "$TARBALL_URL" | sha256sum | cut -d' ' -f1)

          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/hytfjwr/homebrew-statusbar.git" tap
          cd tap

          BRANCH="release/statusbar-${TAG}"
          git checkout -b "$BRANCH"

          sed -i "s|archive/refs/tags/v[0-9]*\.[0-9]*\.[0-9]*\.tar\.gz|archive/refs/tags/${TAG}.tar.gz|" Formula/statusbar.rb
          sed -i "s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA256}\"|" Formula/statusbar.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/statusbar.rb
          git commit -m "statusbar ${TAG}"
          git push --force-with-lease origin "$BRANCH"

          # Skip PR creation if one already exists for this branch
          EXISTING=$(gh pr list --repo hytfjwr/homebrew-statusbar --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already exists for ${BRANCH}, skipping"
            exit 0
          fi

          gh pr create \
            --repo hytfjwr/homebrew-statusbar \
            --head "$BRANCH" \
            --title "statusbar ${TAG}" \
            --body "$(cat <<EOF
          Update \`statusbar\` formula to ${TAG}.

          - **URL:** \`${TARBALL_URL}\`
          - **SHA256:** \`${SHA256}\`

          Once CI passes, add the \`pr-pull\` label to publish bottles.
          EOF
          )"
