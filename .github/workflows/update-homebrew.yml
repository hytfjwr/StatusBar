name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: macos-26
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Extract version tag
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          TAG="${BRANCH#release/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Find previous tag for release notes
          PREV=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$PREV" ]; then
            PREV="v0.0.0"
          fi
          echo "previous_tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Build & Package
        run: make package

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV="${{ steps.version.outputs.previous_tag }}"
          NOTES_FLAG="--generate-notes"
          if [ "$PREV" != "v0.0.0" ]; then
            NOTES_FLAG="--generate-notes --notes-start-tag ${PREV}"
          fi
          gh release create "$TAG" \
            StatusBar.zip \
            --title "$TAG" \
            $NOTES_FLAG

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.publish.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set, skipping Homebrew tap update"
            exit 0
          fi

          ZIP_URL="https://github.com/${REPO}/releases/download/${TAG}/StatusBar.zip"
          SHA256=$(curl -fsSL --retry 3 --retry-delay 2 "$ZIP_URL" | sha256sum | cut -d' ' -f1)
          VERSION="${TAG#v}"

          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/hytfjwr/homebrew-statusbar.git" tap
          cd tap

          BRANCH="release/statusbar-${TAG}"
          git checkout -b "$BRANCH"

          sed -i "s|version \"[0-9]*\.[0-9]*\.[0-9]*\"|version \"${VERSION}\"|" Casks/statusbar.rb
          sed -i "s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA256}\"|" Casks/statusbar.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/statusbar.rb
          git commit -m "statusbar ${TAG}"
          git push --force-with-lease origin "$BRANCH"

          # Skip PR creation if one already exists for this branch
          EXISTING=$(gh pr list --repo hytfjwr/homebrew-statusbar --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already exists for ${BRANCH}, skipping"
            exit 0
          fi

          gh pr create \
            --repo hytfjwr/homebrew-statusbar \
            --head "$BRANCH" \
            --title "statusbar ${TAG}" \
            --body "$(cat <<EOF
          Update \`statusbar\` cask to ${TAG}.

          - **URL:** \`${ZIP_URL}\`
          - **SHA256:** \`${SHA256}\`
          EOF
          )"
